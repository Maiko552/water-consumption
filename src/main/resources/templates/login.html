<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Consumo de Água</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1f3c88, #4facfe);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #1f3c88;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            transition: 0.2s;
        }

        input:focus {
            border-color: #1f3c88;
            outline: none;
            box-shadow: 0 0 0 2px rgba(31, 60, 136, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #1f3c88;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #16306d;
        }

        .error {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">💧 Consumo de Água</div>
    <div class="subtitle">Acesse sua conta</div>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label for="username">E-mail</label>
            <input type="email" id="username" name="username" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit">Entrar</button>

    </form>

    <div class="error" th:if="${param.error}">
        E-mail ou senha inválidos
    </div>

    <div class="footer">
        Projeto acadêmico • Controle de consumo
    </div>
</div>

</body>
</html>
