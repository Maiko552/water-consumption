spring:
  datasource:
    url: jdbc:h2:mem:consumo_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

security:
  jwt:
    secret: minha-chave-jwt-super-segura-12345678901234567890
    expiration: 86400000
